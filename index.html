<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kettlebell + Treadmill Workout</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
    <h1>Kettlebell + Treadmill Workout</h1>
    <nav>
        <button onclick="showScreen('home')">Home</button>
        <button onclick="showScreen('library')">Exercise Library</button>
        <button onclick="showScreen('workout')">Start Workout</button>
    </nav>
</header>

    <!-- HOME SCREEN -->
    <section id="home" class="screen active">
        <h2>Welcome Jay</h2>
        <p>Your kettlebell + treadmill workout app is ready.</p>
    </section>

    <!-- EXERCISE LIBRARY -->
    <section id="library" class="screen">
        <h2>Exercise Library</h2>

        <div class="exercise">
            <h3>Kettlebell Swings</h3>
            <iframe width="300" height="169" src="https://www.youtube.com/embed/2h2YqK0uD8E" allowfullscreen></iframe>
        </div>

        <div class="exercise">
            <h3>Goblet Squats</h3>
            <iframe width="300" height="169" src="https://www.youtube.com/embed/6xwG3nQeW8U" allowfullscreen></iframe>
        </div>

        <div class="exercise">
            <h3>Treadmill Intervals</h3>
            <iframe width="300" height="169" src="https://www.youtube.com/embed/8Z1eW0zO7iE" allowfullscreen></iframe>
        </div>
    </section>

    <!-- WORKOUT SCREEN -->
    <section id="workout" class="screen">
        <h2>Workout Flow</h2>

        <p id="currentStep">Press Start to begin.</p>

        <div class="timer">
            <span id="timeDisplay">00:30</span>
        </div>

        <div class="progress">
            <div id="progressBar"></div>
        </div>

        <button onclick="startWorkout()">Start Workout</button>
        <button onclick="nextStep()">Next Step</button>
        <button onclick="resetWorkout()">Reset</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
